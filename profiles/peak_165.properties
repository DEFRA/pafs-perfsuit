# Profile: peak_165
# Purpose: Stress / capacity-ceiling test — 165 concurrent users, ~87 minute total run
# Use this to find the absolute throughput limit and establish headroom above the
# peak_75 stretch target.
#
# Distribution (same proportions as peak_75):
#   S01 (Create New Proposal)  :  9 users  —  5.5% of load
#   S02 (Existing Proposal)    : 148 users — 89.7% of load  (core browse/edit workflow)
#   S03 (Auto User Creation)   :  4 users  —  2.4% of load
#   S04 (General User Creation):  4 users  —  2.4% of load
#
# Timing:
#   S02 starts at t=0 and ramps 10 s/user over ~24.7 min (1480 s) to 148 threads.
#   S01 starts once S02 is fully loaded (delay = 1480 s), ramps 10 s/user over 90 s.
#   S03 and S04 start after S01 is loaded, ramp over 20 s each.
#   All groups run for 3600 s (1 hour) of steady state.
#   Total wall-clock run: ~87 minutes.
#
# Pre-requisites — set these env vars in CDP Portal BEFORE running:
#   POSTGRES_POOL_MAX=100
#     At 165 users across 2 ECS tasks (~83/task) each needing 3 DB queries at JWT
#     validation time, pool max 10 (default) will exhaust immediately and cascade into
#     401 errors and submission failures. 100 per task gives 2× headroom.
#
#   POSTGRES_POOL_CONNECTION_TIMEOUT_MS=15000
#     Allows queued requests to wait a full 15 s for a connection under burst load
#     rather than failing at 5 s. Reduces false-failure spike at ramp start.
#
#   DB instance class: db.t3.medium supports ~340 connections.
#   2 ECS tasks × 100 pool = 200 connections — safely within limit.
#   Scale to db.t3.large if connection count approaches 300+.
#
# Seed data:
#   Run: node generate-seed.js peak165
#   This produces 300 S02 accounts and 300 project slugs (2× headroom for 148 threads).
#   Commit the updated scenarios/*.csv and trigger a Docker rebuild before running.

# Think time between transactions (ms)
think_time=10000

# S01 — Create New Proposal  [9 users · 90s ramp · 60 min steady · starts after S02 loaded]
s01.threads=9
s01.ramp=90
s01.duration=3690
s01.delay=1480

# S02 — Existing Proposal (bulk of users)  [148 users · ~24.7 min ramp · 60 min steady]
s02.threads=148
s02.ramp=1480
s02.duration=5080
s02.delay=0

# S03 — Auto User Creation  [4 users · 20s ramp · 60 min steady · starts after S01 loaded]
s03.threads=4
s03.ramp=20
s03.duration=3620
s03.delay=1570

# S04 — General User Creation  [4 users · 20s ramp · 60 min steady · starts after S03 loaded]
s04.threads=4
s04.ramp=20
s04.duration=3620
s04.delay=1590
