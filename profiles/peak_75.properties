# Profile: peak_75
# Purpose: Peak load test — 75 concurrent users, ~72 minute total run
# Use this for stress testing above normal capacity (NFR_CP_1 stretch target).
#
# Distribution:
#   S01 (Create New Proposal) : 4 users  —  5% of load
#   S02 (Existing Proposal)   : 67 users — 89% of load  (core browse/edit workflow)
#   S03 (Auto User Creation)  : 2 users  —  3% of load
#   S04 (General User Creation): 2 users —  3% of load
#
# Timing: S02 ramps at 10s/user (670s). S01/S03/S04 start after S02 is fully loaded.
# All groups have ramp_time + 3600s steady state = 1 hour continuous load.

# Think time between transactions (ms)
think_time=10000

# S01 — Create New Proposal  [4 users · 40s ramp · 60 min steady]
s01.threads=4
s01.ramp=40
s01.duration=3640
s01.delay=670

# S02 — Existing Proposal (bulk of users)  [67 users · 11 min ramp · 60 min steady]
s02.threads=67
s02.ramp=670
s02.duration=4270
s02.delay=0

# S03 — Auto User Creation  [2 users · 20s ramp · 60 min steady]
s03.threads=2
s03.ramp=20
s03.duration=3620
s03.delay=710

# S04 — General User Creation  [2 users · 20s ramp · 60 min steady]
s04.threads=2
s04.ramp=20
s04.duration=3620
s04.delay=730
