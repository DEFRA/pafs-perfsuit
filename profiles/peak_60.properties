# Profile: peak_60
# Purpose: Peak load test — 60 concurrent users, ~75 minute run
# Matches: NF_CP_1 capacity NFR (current user base), standard performance validation.
#
# Distribution:
#   S01 (Create New Proposal) : 3 users  —  5% of load
#   S02 (Existing Proposal)   : 54 users — 90% of load  (core browse/edit workflow)
#   S03 (Auto User Creation)  : 2 users  —  3% of load
#   S04 (General User Creation): 2 users —  3% of load
#
# Timing:
#   S02 starts immediately and ramps over 9 min to simulate organic arrival.
#   S01/S03/S04 have a startup delay so the main load (S02) is already running.

# Think time between transactions (ms)
think_time=10000

# S01 — Create New Proposal  [3 users · 30s ramp · 60 min steady]
s01.threads=3
s01.ramp=30
s01.duration=3630
s01.delay=540

# S02 — Existing Proposal (bulk of users)  [54 users · 9 min ramp · 60 min steady]
s02.threads=54
s02.ramp=540
s02.duration=4140
s02.delay=0

# S03 — Auto User Creation  [2 users · 20s ramp · 60 min steady]
s03.threads=2
s03.ramp=20
s03.duration=3620
s03.delay=570

# S04 — General User Creation  [2 users · 20s ramp · 60 min steady]
s04.threads=2
s04.ramp=20
s04.duration=3620
s04.delay=600
