# Profile: soak
# Purpose: Soak / endurance test — 30 concurrent users, ~4 hour run
# Use this to detect memory leaks, connection pool exhaustion, and gradual degradation
# over sustained load. Typically run overnight.
#
# Distribution:
#   S01 (Create New Proposal) : 1 user   —  3% of load
#   S02 (Existing Proposal)   : 27 users — 90% of load
#   S03 (Auto User Creation)  : 1 user   —  3% of load
#   S04 (General User Creation): 1 user  —  3% of load

# Think time between transactions (ms)
think_time=10000

# S01 — Create New Proposal  [1 user · 30s ramp · 4 hr steady]
s01.threads=1
s01.ramp=30
s01.duration=14430
s01.delay=270

# S02 — Existing Proposal (bulk of users)  [27 users · 4.5 min ramp · 4 hr steady]
s02.threads=27
s02.ramp=270
s02.duration=14670
s02.delay=0

# S03 — Auto User Creation  [1 user · 20s ramp · 4 hr steady]
s03.threads=1
s03.ramp=20
s03.duration=14420
s03.delay=300

# S04 — General User Creation  [1 user · 20s ramp · 4 hr steady]
s04.threads=1
s04.ramp=20
s04.duration=14420
s04.delay=320
